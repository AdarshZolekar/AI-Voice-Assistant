<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    /* ── Chat window ── */
    #chat {
      width: 100%;
      max-width: 680px;
      background: #16162a;
      border: 1px solid #2d2d50;
      border-radius: 16px;
      padding: 20px;
      min-height: 300px;
      max-height: 55vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.92rem;
    }
    .msg.user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #1e293b; color: #cbd5e1; border-bottom-left-radius: 4px; }

    .label {
      font-size: 0.72rem;
      color: #475569;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    /* typing indicator */
    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #64748b;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 680px;
    }

    #textInput {
      flex: 1;
      background: #16162a;
      border: 1px solid #2d2d50;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #textInput:focus { border-color: #4f46e5; }

    button {
      padding: 11px 18px;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active  { transform: scale(0.96); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #sendBtn  { background: #4f46e5; color: #fff; }
    #micBtn   { background: #1e293b; color: #94a3b8; font-size: 1.2rem; }
    #micBtn.recording { background: #dc2626; color: #fff; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }

    #status {
      font-size: 0.78rem;
      color: #475569;
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>

<h1>🎙 AI Voice Assistant</h1>
<p class="subtitle">Powered by OpenAI · Can search the internet</p>

<div id="chat"></div>

<div class="controls">
  <button id="micBtn" title="Hold to record">🎤</button>
  <input id="textInput" type="text" placeholder="Type a message or use the mic…" />
  <button id="sendBtn">Send</button>
</div>
<div id="status"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let threadId = null;
  let recognition = null;
  let isRecording = false;

  const chat      = document.getElementById("chat");
  const textInput = document.getElementById("textInput");
  const sendBtn   = document.getElementById("sendBtn");
  const micBtn    = document.getElementById("micBtn");
  const statusEl  = document.getElementById("status");

  // ── Initialise thread on load ──────────────────────────────────────────────
  async function initThread() {
    setStatus("Connecting…");
    try {
      const res = await fetch("/thread");
      const data = await res.json();
      threadId = data.threadId;
      setStatus("Ready. Say something or type below.");
    } catch {
      setStatus("⚠️ Could not connect to server. Is it running?");
    }
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function sendMessage(text) {
    text = text.trim();
    if (!text || !threadId) return;

    appendMsg("user", text);
    textInput.value = "";
    setDisabled(true);
    setStatus("Thinking…");

    const typingEl = appendTyping();

    try {
      const res = await fetch("/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ threadId, message: text }),
      });

      const data = await res.json();
      typingEl.remove();

      if (!res.ok) throw new Error(data.error ?? "Server error");

      appendMsg("bot", data.message);
      speak(data.message);
      setStatus("Done.");
    } catch (err) {
      typingEl.remove();
      appendMsg("bot", `⚠️ ${err.message}`);
      setStatus("Error — see message above.");
    } finally {
      setDisabled(false);
      textInput.focus();
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function appendMsg(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = `msg ${role === "user" ? "user" : "bot"}`;

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
  }

  function appendTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "msg bot";

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
  }

  function setDisabled(disabled) {
    sendBtn.disabled = disabled;
    micBtn.disabled = disabled;
    textInput.disabled = disabled;
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  // ── Text-to-speech (Web Speech API) ───────────────────────────────────────
  function speak(text) {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    window.speechSynthesis.speak(utter);
  }

  // ── Speech-to-text (Web Speech API) ───────────────────────────────────────
  function setupSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      micBtn.title = "Speech recognition not supported in this browser";
      micBtn.disabled = true;
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      textInput.value = transcript;
      sendMessage(transcript);
    };

    recognition.onerror = (e) => {
      setStatus(`Mic error: ${e.error}`);
      stopRecording();
    };

    recognition.onend = stopRecording;
  }

  function startRecording() {
    if (!recognition) return;
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "⏹";
    setStatus("Listening…");
    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
    if (statusEl.textContent === "Listening…") setStatus("");
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", () => sendMessage(textInput.value));

  textInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage(textInput.value);
  });

  micBtn.addEventListener("click", () => {
    if (isRecording) {
      recognition?.stop();
    } else {
      startRecording();
    }
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  setupSpeechRecognition();
  initThread();
</script>
</body>
</html>
